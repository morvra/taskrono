<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><title>Utils Test</title></head>
<body>
<pre id="output"></pre>
<script type="module">
import { escapeHtml, formatTime, formatClockTime, calculateActualTime, getPlainTaskName, formatTaskName, getFormattedDate } from './js/utils.js';

const results = [];

function test(name, actual, expected) {
    const pass = JSON.stringify(actual) === JSON.stringify(expected);
    results.push(`${pass ? '✅' : '❌'} ${name}`);
    if (!pass) {
        results.push(`   期待値: ${JSON.stringify(expected)}`);
        results.push(`   実際値: ${JSON.stringify(actual)}`);
    }
}

// escapeHtml
test('escapeHtml: 基本', escapeHtml('<b>hello</b>'), '&lt;b&gt;hello&lt;/b&gt;');
test('escapeHtml: nullは空文字', escapeHtml(null), '');

// formatTime
test('formatTime: 90秒', formatTime(90), '01:30');
test('formatTime: 0秒', formatTime(0), '00:00');
test('formatTime: 3600秒', formatTime(3600), '60:00');

// calculateActualTime
test('calculateActualTime: startTimeとendTimeから計算',
    calculateActualTime({
        startTime: '2024-01-01T00:00:00.000Z',
        endTime:   '2024-01-01T00:01:30.000Z',
        status: 'completed'
    }),
    90
);
test('calculateActualTime: どちらもなければ0',
    calculateActualTime({ status: 'pending' }),
    0
);

// getPlainTaskName
test('getPlainTaskName: markdownリンクをテキストに',
    getPlainTaskName('[Google](https://google.com)'),
    'Google'
);
test('getPlainTaskName: 普通のテキストはそのまま',
    getPlainTaskName('普通のタスク'),
    '普通のタスク'
);

// getFormattedDate
test('getFormattedDate: 日付フォーマット',
    getFormattedDate(new Date('2024-03-15T10:00:00'), 4),
    '2024-03-15'
);

document.getElementById('output').textContent = results.join('\n');
</script>
</body>
</html>
